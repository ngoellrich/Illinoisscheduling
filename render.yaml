# Render Blueprint — web service + Postgres + a safety-net cron.
# Deploy: push this repo to GitHub, then in Render: New > Blueprint > pick repo.
# After first deploy, set the sync:false env vars in the dashboard (see README).

envVarGroups:
  - name: solar-shared
    envVars:
      - key: APP_URL
        sync: false # https://<your-web-service>.onrender.com
      - key: CRON_SECRET
        generateValue: true # protects /api/cron; shared by web + cron

services:
  - type: web
    name: solar-scheduler
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build && npx prisma db push
    startCommand: npm run start
    healthCheckPath: /login
    envVars:
      - fromGroup: solar-shared
      - key: DATABASE_URL
        fromDatabase:
          name: solar-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: ADMIN_EMAILS
        sync: false
      - key: BUSINESS_TIMEZONE
        value: America/Chicago
      - key: APPOINTMENT_MINUTES
        value: "60"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false

  # Renews the Google push channel and runs a safety sync every 5 minutes.
  - type: cron
    name: solar-cron
    runtime: node
    schedule: "*/5 * * * *"
    buildCommand: "true"
    startCommand: 'curl -fsS "$APP_URL/api/cron?key=$CRON_SECRET"'
    envVars:
      - fromGroup: solar-shared

databases:
  - name: solar-db
    plan: basic-256mb
